{% load static %}

<head>
  <!-- favicon -->
   <script src="https://cdn.tailwindcss.com"></script>
  <link rel="shortcut icon" href="{% static 'images/favicon.png' %}" />

  <!-- theme meta -->
  <meta name="theme-name" content="Pinwheel" />
  <meta name="msapplication-TileColor" content="#000000" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fff" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000" />

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />

  <title>{% block title %}Pinwheel{% endblock %}</title>

  <meta name="description" content="meta description" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="/" />

  <!-- fonts (ساده‌سازی شده) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

  <!-- Swiper -->
  <link rel="stylesheet" href="{% static 'plugins/swiper/swiper-bundle.css' %}" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="{% static 'plugins/font-awesome/v6/fontawesome.css' %}" />
  <link rel="stylesheet" href="{% static 'plugins/font-awesome/v6/solid.css' %}" />
  <link rel="stylesheet" href="{% static 'plugins/font-awesome/v6/brands.css' %}" />

  <!-- Main CSS (اگر داری build شد) -->
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />
</head>
