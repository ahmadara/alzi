{% extends "base.html" %}
{% load static %}

{% block content %}

<section class="section">
  <div class="container">

    <h1 class="h2 mb-8">{{ category.name }}</h1>

    <div class="grid md:grid-cols-3 gap-6">

      {% for item in news_list %}
        <a href="{{ item.get_absolute_url }}" class="block bg-white p-4 rounded-xl">
          <h3>{{ item.title }}</h3>
        </a>
      {% endfor %}

    </div>

  </div>
</section>

{% endblock %}
