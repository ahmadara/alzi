<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <!-- Soft background blob -->
  <ellipse cx="115" cy="90" rx="108" ry="85" fill="#BFDBFE" opacity="0.65"/>

  <!-- Brain outline - profile view with circuit style -->
  <!-- Top left bump -->
  <path d="M 62,82 C 52,70 54,54 66,44 C 78,34 94,36 102,42" stroke="#0369A1" stroke-width="5" stroke-linecap="round"/>
  <!-- Top right bump -->
  <path d="M 102,42 C 112,34 130,34 142,44 C 154,54 154,70 148,82" stroke="#0369A1" stroke-width="5" stroke-linecap="round"/>
  <!-- Left side going down -->
  <path d="M 62,82 C 52,96 54,112 60,122" stroke="#0369A1" stroke-width="5" stroke-linecap="round"/>
  <!-- Right side going down -->
  <path d="M 148,82 C 158,96 156,112 150,122" stroke="#0369A1" stroke-width="5" stroke-linecap="round"/>
  <!-- Bottom curve -->
  <path d="M 60,122 C 64,138 80,148 98,148 C 116,148 132,138 150,122" stroke="#0369A1" stroke-width="5" stroke-linecap="round"/>
  <!-- Inner left loop (gyrus) -->
  <path d="M 62,82 C 68,74 80,70 88,76 C 96,82 94,92 88,96" stroke="#0369A1" stroke-width="4" stroke-linecap="round"/>
  <!-- Inner right loop (gyrus) -->
  <path d="M 148,82 C 142,74 130,70 122,76 C 114,82 116,92 122,96" stroke="#0369A1" stroke-width="4" stroke-linecap="round"/>

  <!-- GSAH letters as circuit-board style paths -->

  <!-- G -->
  <path d="M 80,68 C 72,64 64,68 64,78 C 64,88 72,92 80,88 L 80,82 L 76,82" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- S -->
  <path d="M 100,68 C 96,64 88,66 88,72 C 88,78 100,80 100,86 C 100,92 92,94 88,90" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- A -->
  <path d="M 108,92 L 116,64 L 124,92 M 110,82 L 122,82" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- H -->
  <path d="M 130,64 L 130,92 M 130,78 L 142,78 M 142,64 L 142,92" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Circuit nodes at bottom -->
  <path d="M 78,148 L 78,158" stroke="#0369A1" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="78" cy="162" r="5.5" fill="#0284C7"/>

  <path d="M 105,150 L 105,158" stroke="#0EA5E9" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="105" cy="162" r="4.5" fill="#38BDF8"/>

  <!-- Long tail at bottom right -->
  <path d="M 130,148 C 138,152 146,158 152,168" stroke="#0369A1" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="152" cy="172" r="6" fill="#0284C7"/>
</svg>
